<!DOCTYPE html>
<html>
<head>
  <title>Isaac Brock | Brockstagram</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fafafa;
    }

    .header {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
    }

    .profile {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .pfp {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ccc;
    }

    .username {
      font-size: 22px;
      font-weight: bold;
    }

    .stats {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }

    .feed {
      max-width: 600px;
      margin: 0 auto 40px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .post {
      background: white;
      border: 1px solid #ddd;
      height: 350px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #777;
      font-size: 18px;
    }

    .post small {
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">Brockstagram</div>
    <div>Search 🔍</div>
  </div>

  <div class="profile">
    <div class="top">
      <img class="pfp" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Georgeprevost.JPG/250px-Georgeprevost.JPG">
      <div>
        <div class="username">Isaac Brock</div>
        <div class="stats">
          6 posts • 12000 followers • 24 following
        </div>
      </div>
    </div>
  </div>

  <!-- SCROLL FEED -->
  <div class="feed">
    <div class="post">Post 1</div>
    <div class="post">Post 2</div>
    <div class="post">Post 3</div>
    <div class="post">Post 4</div>
    <div class="post">Post 5</div>
    <div class="post">Post 6</div>
  </div>

</body>
</html>
